<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Website Sedang Update</title>
    
    <!-- Google Fonts: Plus Jakarta Sans -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;700;900&display=swap" rel="stylesheet">
    
    <!-- Tabler Icons -->
    <link href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" rel="stylesheet">

    <style>
        /* =========================================
           NEO BRUTALISM VARIABLES
        ========================================= */
        :root {
            --bg-color: #F7F7F7;
            --card-color: #FFFFFF;
            --text-color: #111111;
            
            --yellow: #FFD84D;
            --pink: #FF90E8;
            --green: #7DFF9A;
            --blue: #8BE9FD;

            --border-thick: 4px solid #111;
            --shadow-solid: 8px 8px 0 #111;
            --shadow-hover: 12px 12px 0 #111;
            
            --radius: 16px;
        }

        /* =========================================
           GLOBAL RESETS
        ========================================= */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--yellow); /* Background mencolok */
            color: var(--text-color);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            overflow: hidden; /* Mencegah scroll berlebih */
        }

        /* =========================================
           CARD STYLE
        ========================================= */
        .maintenance-card {
            background-color: var(--card-color);
            border: var(--border-thick);
            box-shadow: var(--shadow-solid);
            border-radius: var(--radius);
            padding: 40px;
            max-width: 500px;
            width: 100%;
            text-align: center;
            position: relative;
            transform: translateY(20px);
            opacity: 0;
            animation: slideUp 0.6s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }

        @keyframes slideUp {
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .icon-wrapper {
            width: 80px;
            height: 80px;
            margin: 0 auto 20px;
            background-color: var(--pink);
            border: var(--border-thick);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            box-shadow: 4px 4px 0 #111;
        }

        .maintenance-card h1 {
            font-size: 32px;
            font-weight: 900;
            margin-bottom: 12px;
            text-transform: uppercase;
            line-height: 1.2;
        }

        .maintenance-card p {
            font-size: 16px;
            font-weight: 600;
            line-height: 1.6;
            margin-bottom: 30px;
            color: #333;
        }

        /* =========================================
           BUTTONS
        ========================================= */
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 16px 20px;
            font-size: 16px;
            font-weight: 800;
            color: var(--text-color);
            text-decoration: none;
            border: var(--border-thick);
            border-radius: 12px;
            box-shadow: 4px 4px 0 #111;
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .btn-channel {
            background-color: var(--green);
        }

        .btn-cs {
            background-color: var(--blue);
        }

        .btn:hover {
            transform: translate(-3px, -3px);
            box-shadow: 7px 7px 0 #111;
        }

        .btn:active {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0 #111;
        }

        .btn i {
            font-size: 24px;
        }

        /* =========================================
           BACKGROUND ELEMENTS
        ========================================= */
        .bg-shape {
            position: absolute;
            z-index: -1;
            border: var(--border-thick);
            background: var(--card-color);
            box-shadow: var(--shadow-solid);
        }
        
        .shape-1 {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            top: 10%;
            left: 5%;
            background: var(--blue);
        }

        .shape-2 {
            width: 100px;
            height: 100px;
            bottom: 15%;
            right: 8%;
            background: var(--pink);
            transform: rotate(15deg);
        }

        /* =========================================
           RESPONSIVE
        ========================================= */
        @media (max-width: 480px) {
            .maintenance-card {
                padding: 30px 20px;
            }
            .maintenance-card h1 {
                font-size: 26px;
            }
            .btn {
                font-size: 14px;
            }
        }
    </style>
</head>
<body>

    <!-- Background Ornamen -->
    <div class="bg-shape shape-1" id="shape1"></div>
    <div class="bg-shape shape-2" id="shape2"></div>

    <!-- Main Card -->
    <div class="maintenance-card" id="mainCard">
        <div class="icon-wrapper">
            <i class="ti ti-tool"></i>
        </div>
        
        <h1>Oops! Something Wrong</h1>
        
        <p>
            Website sedang update. Informasi selengkapnya bisa kunjungi tautan di bawah ini.
        </p>
        
        <div class="btn-group">
            <!-- Link Saluran WhatsApp -->
            <a href="https://whatsapp.com/channel/0029VbBywra3gvWaDIKyMe3N" target="_blank" class="btn btn-channel">
                <i class="ti ti-brand-whatsapp"></i>
                WhatsApp Saluran Resmi
            </a>
            
            <!-- Link Customer Service -->
            <a href="https://wa.me/628811147684" target="_blank" class="btn btn-cs">
                <i class="ti ti-headset"></i>
                Nomer WhatsApp CS
            </a>
        </div>
    </div>

    <!-- Interaksi JavaScript Ringan -->
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const card = document.getElementById("mainCard");
            const shape1 = document.getElementById("shape1");
            const shape2 = document.getElementById("shape2");

            // Efek interaktif sederhana saat mouse digerakkan
            document.addEventListener("mousemove", (e) => {
                const x = e.clientX / window.innerWidth - 0.5;
                const y = e.clientY / window.innerHeight - 0.5;

                // Memiringkan kartu sedikit
                card.style.transform = `perspective(1000px) rotateY(${x * 10}deg) rotateX(${-y * 10}deg) translateY(0)`;
                
                // Menggerakkan ornamen background
                shape1.style.transform = `translate(${x * -30}px, ${y * -30}px)`;
                shape2.style.transform = `translate(${x * 40}px, ${y * 40}px) rotate(15deg)`;
            });

            // Kembalikan ke posisi semula saat mouse keluar dari layar
            document.addEventListener("mouseleave", () => {
                card.style.transform = "perspective(1000px) rotateY(0deg) rotateX(0deg) translateY(0)";
                shape1.style.transform = "translate(0, 0)";
                shape2.style.transform = "translate(0, 0) rotate(15deg)";
            });

            console.log("%c Mode Maintenance Aktif ", "background:#111; color:#7DFF9A; font-size:14px; font-weight:bold; padding:5px; border-radius:4px;");
        });
    </script>
</body>
</html>
